<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer - Salon Booking</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #f0f0f0;
        }
        h1 {
            color: #e94560;
        }
        .back-btn {
            padding: 10px 20px;
            background: linear-gradient(135deg, #e94560 0%, #c73659 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(233, 69, 96, 0.3);
        }
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }
        .tab {
            padding: 12px 24px;
            background: #f0f0f0;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }
        .tab.active {
            background: #e94560;
            color: white;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }
        select, input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
        }
        select:focus, input:focus {
            outline: none;
            border-color: #e94560;
        }
        .btn {
            padding: 12px 30px;
            background: linear-gradient(135deg, #e94560 0%, #c73659 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(233, 69, 96, 0.3);
        }
        .btn:hover {
            background: linear-gradient(135deg, #c73659 0%, #a52b4a 100%);
            transform: translateY(-2px);
        }
        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .service-card {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 12px;
            border: 2px solid #e0e0e0;
            cursor: pointer;
            transition: all 0.3s;
        }
        .service-card:hover {
            border-color: #e94560;
            transform: translateY(-5px);
        }
        .service-card.selected {
            border-color: #e94560;
            background: rgba(233, 69, 96, 0.1);
        }
        .service-name {
            font-weight: 700;
            font-size: 1.2em;
            color: #333;
            margin-bottom: 10px;
        }
        .service-price {
            color: #e94560;
            font-weight: 600;
            font-size: 1.1em;
        }
        .service-duration {
            color: #666;
            font-size: 0.9em;
        }
        .staff-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }
        .staff-card {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 12px;
            border: 2px solid #e0e0e0;
            transition: all 0.3s;
            cursor: pointer;
        }
        .staff-card:hover {
            border-color: #6366f1;
            transform: translateY(-2px);
        }
        .staff-card.selected {
            border-color: #6366f1;
            background: #eef2ff;
        }
        .staff-name {
            font-weight: 600;
            margin-bottom: 5px;
        }
        .staff-role {
            color: #666;
            font-size: 0.9em;
        }
        .staff-status {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 0.8em;
            font-weight: 600;
            margin-top: 8px;
        }
        .status-available {
            background: #d4edda;
            color: #155724;
        }
        .status-busy {
            background: #f8d7da;
            color: #721c24;
        }
        .status-off {
            background: #fff3cd;
            color: #856404;
        }
        .queue-display {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 12px;
            margin-top: 20px;
        }
        .queue-item {
            display: flex;
            justify-content: space-between;
            padding: 12px;
            background: white;
            border-radius: 8px;
            margin-bottom: 10px;
        }
        .data-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .data-table th, .data-table td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid #e0e0e0;
        }
        .data-table th {
            background: #f8f9fa;
            font-weight: 600;
            color: #333;
        }
        .data-table tr:hover {
            background: #f8f9fa;
        }
        .data-table tbody tr:last-child td {
            border-bottom: none;
        }
        .message {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: 600;
        }
        .success {
            background: #d4edda;
            color: #155724;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Customer Portal</h1>
            <div>
                <span id="userInfo" style="margin-right: 15px; font-weight: 600;"></span>
                <button class="back-btn" onclick="logout()">Logout</button>
            </div>
        </div>
        
        <div class="tabs">
            <button class="tab active" onclick="showTab('walkin')">Walk-in Queue</button>
            <button class="tab" onclick="showTab('reservation')">Book Appointment</button>
            <button class="tab" onclick="showTab('queue')">View Queue</button>
            <button class="tab" onclick="showTab('myreservations')">Your Reservations</button>
        </div>

        <div id="message"></div>

        <!-- Walk-in Queue Tab -->
        <div id="walkin" class="tab-content active">
            <h2>Join Walk-in Queue</h2>
            <div class="form-group">
                <label>Select Service</label>
                <div id="servicesList" class="services-grid"></div>
            </div>
            <div class="form-group" id="staffAvailability" style="display:none;">
                <label>Staff Availability</label>
                <div id="staffList" class="staff-list"></div>
            </div>
            <button class="btn" onclick="joinQueue()">Join Queue</button>
        </div>

        <!-- Reservation Tab -->
        <div id="reservation" class="tab-content">
            <h2>Book Appointment</h2>
            <div class="form-group">
                <label>Select Service</label>
                <div id="resServicesList" class="services-grid"></div>
            </div>
            <div class="form-group" id="resStaffAvailability" style="display:none;">
                <label>Select Staff</label>
                <div id="resStaffList" class="staff-list"></div>
            </div>
            <div class="form-group" id="dateSelection" style="display:none;">
                <label>Select Date</label>
                <input type="date" id="scheduleDate" min="">
            </div>
            <div class="form-group" id="timeSelection" style="display:none;">
                <label>Select Time</label>
                <input type="time" id="scheduleTime">
            </div>
            <button class="btn" onclick="bookReservation()">Book Appointment</button>
        </div>

        <!-- View Queue Tab -->
        <div id="queue" class="tab-content">
            <h2>Current Queue</h2>
            <div id="queueDisplay" class="queue-display"></div>
        </div>

        <!-- Your Reservations Tab -->
        <div id="myreservations" class="tab-content">
            <h2>Your Reservations</h2>
            <table id="customerReservationsTable" class="data-table">
                <thead>
                    <tr>
                        <th>Service</th>
                        <th>Staff</th>
                        <th>Date</th>
                        <th>Time</th>
                    </tr>
                </thead>
                <tbody id="customerReservationsBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        let currentUser = null;
        let selectedService = null;
        let resSelectedService = null;

        // Check if user is logged in
        function checkAuth() {
            const userStr = localStorage.getItem('user');
            if (!userStr) {
                window.location.href = '/';
                return;
            }
            currentUser = JSON.parse(userStr);
            
            if (!currentUser.CustomerID) {
                showMessage('Account setup incomplete. Please sign up again.', 'error');
                setTimeout(() => {
                    localStorage.removeItem('user');
                    window.location.href = '/';
                }, 2000);
                return;
            }
            
            document.getElementById('userInfo').textContent = `Welcome, ${currentUser.Name}`;
        }

        function logout() {
            localStorage.removeItem('user');
            window.location.href = '/';
        }

        function showTab(tabName) {
            document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(tabName).classList.add('active');
            
            if (tabName === 'queue') {
                loadQueue();
            }
            if (tabName === 'myreservations') {
                loadCustomerReservations();
            }
        }

        function showMessage(msg, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.innerHTML = `<div class="message ${type}">${msg}</div>`;
            setTimeout(() => messageDiv.innerHTML = '', 5000);
        }

        async function loadServices() {
            const response = await fetch('/api/services');
            const services = await response.json();
            
            const servicesHtml = services.map(service => `
                <div class="service-card" onclick="selectService(${service.ServiceID}, '${service.ServiceName}', this)">
                    <div class="service-name">${service.ServiceName}</div>
                    <div class="service-price">₱${service.Price.toFixed(2)}</div>
                    <div class="service-duration">${service.Duration} mins</div>
                </div>
            `).join('');
            
            document.getElementById('servicesList').innerHTML = servicesHtml;
            document.getElementById('resServicesList').innerHTML = servicesHtml.replace(/selectService/g, 'selectResService');
        }

        let selectedStaff = null;
        let resSelectedStaff = null;

        async function loadStaff() {
            const response = await fetch('/api/staff');
            const staff = await response.json();
            
            // For walk-in queue - non-clickable staff cards (just for display)
            const staffHtmlWalkin = staff.map(s => `
                <div class="staff-card" data-staff-id="${s.StaffID}">
                    <div class="staff-name">${s.Name}</div>
                    <div class="staff-role">${s.Role}</div>
                    <span class="staff-status status-${s.AvailabilityStatus}">${s.AvailabilityStatus}</span>
                </div>
            `).join('');
            
            // For reservation - clickable staff cards
            const staffHtmlRes = staff.map(s => `
                <div class="staff-card" onclick="selectResStaff(${s.StaffID}, '${s.Name}', this)" data-staff-id="${s.StaffID}">
                    <div class="staff-name">${s.Name}</div>
                    <div class="staff-role">${s.Role}</div>
                    <span class="staff-status status-${s.AvailabilityStatus}">${s.AvailabilityStatus}</span>
                </div>
            `).join('');
            
            document.getElementById('staffList').innerHTML = staffHtmlWalkin;
            document.getElementById('resStaffList').innerHTML = staffHtmlRes;
        }

        function selectStaff(id, name, element) {
            selectedStaff = id;
            document.querySelectorAll('#staffList .staff-card').forEach(card => card.classList.remove('selected'));
            element.classList.add('selected');
        }

        function selectResStaff(id, name, element) {
            resSelectedStaff = id;
            document.querySelectorAll('#resStaffList .staff-card').forEach(card => card.classList.remove('selected'));
            element.classList.add('selected');
        }

        function selectService(id, name, element) {
            selectedService = id;
            document.querySelectorAll('#servicesList .service-card').forEach(card => card.classList.remove('selected'));
            element.classList.add('selected');
            document.getElementById('staffAvailability').style.display = 'block';
            loadStaff();
        }


        function selectResService(id, name, element) {
            resSelectedService = id;
            document.querySelectorAll('#resServicesList .service-card').forEach(card => card.classList.remove('selected'));
            element.classList.add('selected');
            
            // Set minimum date to tomorrow
            const tomorrow = new Date();
            tomorrow.setDate(tomorrow.getDate() + 1);
            const tomorrowStr = tomorrow.toISOString().split('T')[0];
            document.getElementById('scheduleDate').min = tomorrowStr;
            
            // Show staff selection
            document.getElementById('resStaffAvailability').style.display = 'block';
            loadStaff();
            document.getElementById('dateSelection').style.display = 'block';
            document.getElementById('timeSelection').style.display = 'block';
        }

        async function joinQueue() {
            if (!selectedService) {
                showMessage('Please select a service', 'error');
                return;
            }

            // Add to queue using logged-in customer ID (staff will be assigned by admin)
            const queueResponse = await fetch('/api/queue', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    CustomerID: currentUser.CustomerID,
                    ServiceID: selectedService,
                    StaffID: null
                })
            });

            if (queueResponse.ok) {
                showMessage('Successfully joined the queue!', 'success');
                selectedService = null;
                document.querySelectorAll('.service-card').forEach(card => card.classList.remove('selected'));
                document.getElementById('staffAvailability').style.display = 'none';
            } else {
                showMessage('Error joining queue', 'error');
            }
        }

        async function bookReservation() {
            const date = document.getElementById('scheduleDate').value;
            const time = document.getElementById('scheduleTime').value;
            
            if (!resSelectedService || !resSelectedStaff || !date || !time) {
                showMessage('Please fill in all fields', 'error');
                return;
            }

            // Validate date - cannot book for today or past dates
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const selectedDate = new Date(date);
            selectedDate.setHours(0, 0, 0, 0);
            
            if (selectedDate <= today) {
                showMessage('You can only book appointments for tomorrow or future dates', 'error');
                return;
            }

            // Create reservation using logged-in customer ID and selected staff
            const resResponse = await fetch('/api/reservations', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    CustomerID: currentUser.CustomerID,
                    ServiceID: resSelectedService,
                    StaffID: resSelectedStaff,
                    ScheduleDate: date,
                    ScheduleTime: time
                })
            });

            if (resResponse.ok) {
                showMessage('Appointment booked successfully!', 'success');
                document.getElementById('scheduleDate').value = '';
                document.getElementById('scheduleTime').value = '';
                resSelectedService = null;
                resSelectedStaff = null;
                document.querySelectorAll('.service-card').forEach(card => card.classList.remove('selected'));
                document.querySelectorAll('.staff-card').forEach(card => card.classList.remove('selected'));
                document.getElementById('resStaffAvailability').style.display = 'none';
                document.getElementById('dateSelection').style.display = 'none';
                document.getElementById('timeSelection').style.display = 'none';
            } else if (resResponse.status === 409) {
                const errorData = await resResponse.json();
                showMessage(errorData.error || 'This time slot is already booked', 'error');
            } else {
                showMessage('Error booking appointment', 'error');
            }
        }

        async function loadQueue() {
            const response = await fetch('/api/queue');
            const queue = await response.json();
            
            if (queue.length === 0) {
                document.getElementById('queueDisplay').innerHTML = '<p>No one in queue right now</p>';
                return;
            }

            const queueHtml = queue.map((q, index) => {
                // Format the joined time with local timezone
                const joinedTime = new Date(q.JoinedAt + 'Z'); // Add Z to treat as UTC
                const timeStr = joinedTime.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true });
                
                return `
                <div class="queue-item">
                    <div>
                        <strong>${q.CustomerName}</strong> - ${q.ServiceName}
                        ${q.StaffName ? `<br><small>with ${q.StaffName}</small>` : ''}
                        <br><small>Joined at ${timeStr}</small>
                    </div>
                    <div>
                        <span class="staff-status status-${q.Status}">${q.Status}</span>
                        <br><small>#${index + 1}</small>
                    </div>
                </div>
            `}).join('');
            
            document.getElementById('queueDisplay').innerHTML = queueHtml;
        }

        async function loadCustomerReservations() {
            const response = await fetch('/api/reservations');
            const allReservations = await response.json();
            
            // Filter reservations for current customer
            const customerReservations = allReservations.filter(r => r.CustomerID === currentUser.CustomerID);
            
            if (customerReservations.length === 0) {
                document.getElementById('customerReservationsBody').innerHTML = '<tr><td colspan="4" style="text-align: center;">No reservations yet</td></tr>';
                return;
            }

            const reservationsHtml = customerReservations.map(r => {
                // Format time to 12-hour format with AM/PM
                const [hours, minutes] = r.ScheduleTime.split(':');
                const hour = parseInt(hours);
                const ampm = hour >= 12 ? 'PM' : 'AM';
                const formattedHour = hour % 12 || 12;
                const formattedTime = `${formattedHour}:${minutes} ${ampm}`;
                
                return `
                <tr>
                    <td>${r.ServiceName}</td>
                    <td>${r.StaffName || 'Not assigned'}</td>
                    <td>${r.ScheduleDate}</td>
                    <td>${formattedTime}</td>
                </tr>
            `}).join('');
            
            document.getElementById('customerReservationsBody').innerHTML = reservationsHtml;
        }

        // Check auth and load services on page load
        checkAuth();
        loadServices();
    </script>
</body>
</html>
