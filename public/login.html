<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - StyleQ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            max-width: 400px;
            width: 100%;
            backdrop-filter: blur(10px);
        }
        h1 {
            color: #e94560;
            text-align: center;
            margin-bottom: 5px;
            font-size: 2.5em;
            font-weight: 700;
            letter-spacing: -1px;
            text-shadow: 0 2px 10px rgba(233, 69, 96, 0.3);
        }
        .subtitle {
            text-align: center;
            color: #e0e0e0;
            margin-bottom: 25px;
            font-size: 0.95em;
        }
        .tabs {
            display: flex;
            gap: 0;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }
        .tab {
            flex: 1;
            padding: 12px;
            background: transparent;
            border: none;
            border-bottom: 3px solid transparent;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
            color: #e0e0e0;
            font-size: 1.1em;
        }
        .tab.active {
            border-bottom-color: #e94560;
            color: #e94560;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }
        input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            font-size: 15px;
            background: rgba(255, 255, 255, 0.9);
            color: #333;
        }
        input:focus {
            outline: none;
            border-color: #e94560;
            background: white;
        }
        .btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #e94560 0%, #c73659 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 1.1em;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(233, 69, 96, 0.3);
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(233, 69, 96, 0.4);
        }
        .btn-admin {
            background: #42b72a;
            margin-top: 10px;
        }
        .btn-admin:hover {
            background: #36a420;
        }
        .message {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: 600;
        }
        .success {
            background: #d4edda;
            color: #155724;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>StyleQ</h1>
        
        <div class="tabs">
            <button class="tab active" onclick="showTab('login')">Login</button>
            <button class="tab" onclick="showTab('signup')">Sign Up</button>
        </div>

        <div id="message"></div>

        <!-- Login Tab -->
        <div id="login" class="tab-content active">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="loginUsername" placeholder="Enter your username">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="loginPassword" placeholder="Enter your password">
            </div>
            <button class="btn" onclick="login()">Login</button>
        </div>

        <!-- Sign Up Tab -->
        <div id="signup" class="tab-content">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="signupName" placeholder="Enter your full name">
            </div>
            <div class="form-group">
                <label>Contact Number</label>
                <input type="text" id="signupContact" placeholder="Enter your contact number">
            </div>
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="signupUsername" placeholder="Choose a username">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="signupPassword" placeholder="Choose a password">
            </div>
            <button class="btn" onclick="signup()">Sign Up</button>
        </div>
    </div>

    <script>
        function showTab(tabName) {
            document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(tabName).classList.add('active');
        }

        function showMessage(msg, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.innerHTML = `<div class="message ${type}">${msg}</div>`;
            setTimeout(() => messageDiv.innerHTML = '', 5000);
        }

        async function login() {
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;
            
            if (!username || !password) {
                showMessage('Please fill in all fields', 'error');
                return;
            }

            const response = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ Username: username, Password: password })
            });

            if (response.ok) {
                const user = await response.json();
                localStorage.setItem('user', JSON.stringify(user));
                // Redirect based on role
                if (user.Role === 'admin') {
                    window.location.href = '/admin';
                } else {
                    window.location.href = '/customer';
                }
            } else {
                showMessage('Invalid credentials', 'error');
            }
        }

        async function signup() {
            const name = document.getElementById('signupName').value;
            const contact = document.getElementById('signupContact').value;
            const username = document.getElementById('signupUsername').value;
            const password = document.getElementById('signupPassword').value;
            
            if (!name || !contact || !username || !password) {
                showMessage('Please fill in all fields', 'error');
                return;
            }

            // First create user
            const userResponse = await fetch('/api/auth/signup', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ Username: username, Password: password, Role: 'customer' })
            });

            if (!userResponse.ok) {
                showMessage('Username already exists', 'error');
                return;
            }

            const user = await userResponse.json();

            // Then create customer
            const customerResponse = await fetch('/api/customers', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    Name: name,
                    ContactNumber: contact,
                    CustomerType: 'new',
                    UserID: user.UserID
                })
            });

            if (customerResponse.ok) {
                const customer = await customerResponse.json();
                localStorage.setItem('user', JSON.stringify({ 
                    ...user, 
                    Name: name, 
                    ContactNumber: contact,
                    CustomerID: customer.CustomerID 
                }));
                showMessage('Account created successfully!', 'success');
                setTimeout(() => window.location.href = '/customer', 1500);
            } else {
                showMessage('Error creating account', 'error');
            }
        }
    </script>
</body>
</html>
